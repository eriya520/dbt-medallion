          - not_null

      - name: SupplierId
        description: '{{ doc("SupplierId") }}'

      - name: CompanyName
        description: '{{ doc("CompanyName") }}'

      - name: ContactName
        description: '{{ doc("ContactName") }}'

      - name: City
        description: '{{ doc("City") }}'

      - name: Country
        description: '{{ doc("Country") }}'

      - name: Phone
        description: '{{ doc("PhoneGold") }}'

  - name: fact_sales
    description: 'Gold layer Fact sales table'
    columns:
      - name: SalesKey
        description: '{{ doc("SalesKey") }}'
        tests: 
          - not_null
          - unique

      - name: OrderId
        description: '{{ doc("OrderId") }}'
        tests:
          - not_null

      - name: OrderItemId
        description: '{{ doc("OrderItemId") }}'
        tests:
          - not_null
        
      - name: ProductKey
        description: '{{ doc("ProductKey") }}'

      - name: CustomerKey
        description: '{{ doc("CustomerKey") }}'
        
      - name: SupplierKey
        description: '{{ doc("SupplierKey") }}'

      - name: DateKey
        description: '{{ doc("DateKey") }}'

      - name: Quantity
        description: '{{ doc("Quantity") }}'
      
      - name: UnitPrice
        description: '{{ doc("UnitPrice") }}'

      - name: TotalAmount
        description: '{{ doc("TotalAmount") }}'