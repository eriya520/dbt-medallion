      - name: Phone
        description: '{{ doc("PhoneGold") }}'

  - name: dim_date
    description: "Gold layer Date table"
    columns:
      - name: DateKey
        description: '{{ doc("DateKey") }}'
        tests: 
          - unique
          - not_null

      - name: Date
        description: '{{ doc("Date") }}'    

